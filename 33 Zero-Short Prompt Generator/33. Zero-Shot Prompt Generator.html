<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero-Shot Prompt Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f2effd;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.badge{
    display:inline-block;
    background:#7c3aed;
    color:white;
    padding:8px 18px;
    border-radius:25px;
    font-size:12px;
    letter-spacing:2px;
    margin-bottom:15px;
}

.header h1{
    color:#6d28d9;
    font-size:48px;
    margin-bottom:10px;
}

.header p{
    color:#666;
}

.card{
    background:white;
    border:1px solid #d8b4fe;
    border-radius:25px;
    padding:25px;
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#6d28d9;
    font-weight:700;
    font-size:13px;
    letter-spacing:1px;
}

input, textarea, select{
    width:100%;
    padding:12px;
    border:1px solid #d8b4fe;
    border-radius:12px;
    background:#faf8ff;
    outline:none;
}

textarea{
    min-height:120px;
    resize:vertical;
}

.buttons{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:12px 24px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.primary{
    background:#7c3aed;
    color:white;
}

.primary:hover{
    background:#6d28d9;
}

.secondary{
    background:#ede9fe;
    color:#6d28d9;
}

.secondary:hover{
    background:#ddd6fe;
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:20px;
}

.stat{
    background:white;
    border:1px solid #d8b4fe;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.stat h3{
    color:#6d28d9;
    font-size:28px;
}

.output-box{
    background:#faf8ff;
    border:1px solid #d8b4fe;
    border-radius:15px;
    padding:20px;
    min-height:250px;
    white-space:pre-wrap;
}

.footer{
    margin-top:40px;
    text-align:center;
    color:#666;
    border-top:1px solid #d8b4fe;
    padding-top:20px;
}

@media(max-width:900px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .stats{
        grid-template-columns:1fr;
    }

    .header h1{
        font-size:34px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="badge">PROMPT ENGINEERING</div>
        <h1>Zero-Shot Prompt Generator</h1>
        <p>Create effective AI prompts without examples</p>
    </div>

    <div class="card">

        <div class="form-grid">

            <div>
                <label>TASK DESCRIPTION</label>
                <textarea id="task"
                placeholder="Describe what AI should do"></textarea>
            </div>

            <div>
                <label>TARGET AUDIENCE</label>
                <input type="text"
                id="audience"
                placeholder="e.g. Students, Developers">
            </div>

            <div>
                <label>TONE</label>
                <select id="tone">
                    <option>Professional</option>
                    <option>Formal</option>
                    <option>Friendly</option>
                    <option>Academic</option>
                    <option>Creative</option>
                </select>
            </div>

            <div>
                <label>OUTPUT FORMAT</label>
                <select id="format">
                    <option>Blog Post</option>
                    <option>Article</option>
                    <option>Email</option>
                    <option>Report</option>
                    <option>Table</option>
                    <option>JSON</option>
                    <option>FAQ</option>
                </select>
            </div>

        </div>

        <div class="buttons">

            <button class="primary"
            onclick="generatePrompt()">
                Generate Prompt
            </button>

            <button class="secondary"
            onclick="copyPrompt()">
                Copy
            </button>

            <button class="secondary"
            onclick="clearAll()">
                Clear
            </button>

        </div>

    </div>

    <div class="stats">

        <div class="stat">
            <h3 id="promptCount">0</h3>
            <p>Generated Prompts</p>
        </div>

        <div class="stat">
            <h3 id="wordCount">0</h3>
            <p>Words</p>
        </div>

        <div class="stat">
            <h3 id="charCount">0</h3>
            <p>Characters</p>
        </div>

        <div class="stat">
            <h3>0</h3>
            <p>Examples Used</p>
        </div>

    </div>

    <div class="card">

        <h2 style="color:#6d28d9;margin-bottom:15px;">
            Generated Zero-Shot Prompt
        </h2>

        <div id="output" class="output-box">
Your generated prompt will appear here...
        </div>

    </div>

    <div class="footer">
    Developed by <span>Hamna Munir</span> | <span>Mirza Yasir Abdullah Baig</span>
   </div>

</div>

<script>

let generatedPrompts = 0;

function generatePrompt(){

    const task =
    document.getElementById("task").value.trim();

    const audience =
    document.getElementById("audience").value.trim();

    const tone =
    document.getElementById("tone").value;

    const format =
    document.getElementById("format").value;

    if(task === ""){
        alert("Please enter a task description.");
        return;
    }

    const prompt =

`TASK:
${task}

TARGET AUDIENCE:
${audience || "General Audience"}

TONE:
${tone}

OUTPUT FORMAT:
${format}

INSTRUCTIONS:
Provide a complete and accurate response.
Do not request examples.
Use only the information provided.
Maintain consistency throughout the response.
Generate the final output directly.`;

    document.getElementById("output")
    .textContent = prompt;

    generatedPrompts++;

    document.getElementById("promptCount")
    .textContent = generatedPrompts;

    document.getElementById("wordCount")
    .textContent =
    prompt.split(/\s+/).filter(Boolean).length;

    document.getElementById("charCount")
    .textContent =
    prompt.length;
}

function copyPrompt(){

    const text =
    document.getElementById("output").innerText;

    navigator.clipboard.writeText(text);

    alert("Prompt copied successfully!");
}

function clearAll(){

    document.getElementById("task").value="";
    document.getElementById("audience").value="";

    document.getElementById("tone").selectedIndex=0;
    document.getElementById("format").selectedIndex=0;

    document.getElementById("output").textContent =
    "Your generated prompt will appear here...";

    document.getElementById("wordCount").textContent="0";
    document.getElementById("charCount").textContent="0";
}

</script>

</body>
</html>
