<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prompt Readability Score</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
  background:linear-gradient(135deg,#f3f0ff,#ede9fe,#faf5ff);
  min-height:100vh;
  padding:20px;
  color:#1e1b4b;
}

/* container */
.container{max-width:1100px;margin:auto;}

/* header */
.header{text-align:center;padding:30px 20px;}
.badge{
  display:inline-block;
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  color:#fff;
  padding:6px 16px;
  border-radius:20px;
  font-size:12px;
  letter-spacing:2px;
  margin-bottom:12px;
}
.header h1{
  font-size:2.5rem;
  font-weight:800;
  background:linear-gradient(90deg,#5b21b6,#7c3aed,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header p{color:#6b7280;margin-top:8px;}

/* input */
.card{
  background:#fff;
  border:1.5px solid #c4b5fd;
  border-radius:18px;
  padding:25px;
  box-shadow:0 4px 20px rgba(124,58,237,0.1);
  margin-bottom:20px;
}

label{
  font-size:12px;
  font-weight:700;
  color:#7c3aed;
  letter-spacing:1.5px;
  display:block;
  margin-bottom:10px;
}

textarea{
  width:100%;
  height:150px;
  padding:14px;
  border-radius:12px;
  border:1.5px solid #ddd6fe;
  background:#faf5ff;
  outline:none;
  font-size:1rem;
  resize:vertical;
}
textarea:focus{
  border-color:#7c3aed;
  box-shadow:0 0 0 3px rgba(124,58,237,0.15);
}

/* buttons */
.btn-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.primary{
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;
}
.clear{
  background:#ede9fe;
  color:#6d28d9;
  border:1px solid #c4b5fd;
}

/* score circle */
.score-box{
  text-align:center;
  padding:25px;
}

.circle{
  width:160px;
  height:160px;
  border-radius:50%;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  font-weight:800;
  background:conic-gradient(#7c3aed 0deg,#ede9fe 0deg);
  color:#1e1b4b;
}

.score-label{
  margin-top:10px;
  font-weight:700;
  color:#5b21b6;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
@media(max-width:800px){
  .grid{grid-template-columns:1fr;}
}

/* list */
.item{
  padding:10px 0;
  border-bottom:1px solid #ede9fe;
  font-size:0.9rem;
}
.item span{color:#7c3aed;font-weight:700;}

/* footer */
.footer{
  text-align:center;
  margin-top:25px;
  font-size:12px;
  color:#9ca3af;
  border-top:1px solid #ddd6fe;
  padding-top:15px;
}
.footer span{color:#7c3aed;font-weight:700;}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="badge">AI TOOL</div>
    <h1>Prompt Readability Score</h1>
    <p>Analyze how easy your prompt is to read and understand</p>
  </div>

  <!-- INPUT -->
  <div class="card">
    <label>ENTER YOUR PROMPT</label>
    <textarea id="text" placeholder="Type your prompt here..."></textarea>

    <div class="btn-row">
      <button class="primary" onclick="analyze()">Analyze</button>
      <button class="clear" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- SCORE -->
  <div class="card score-box">
    <div class="circle" id="circle">0%</div>
    <div class="score-label" id="label">No Data</div>
  </div>

  <!-- DETAILS -->
  <div class="grid">

    <div class="card">
      <h3>📊 Readability Metrics</h3>
      <div class="item">Sentence Length: <span id="sent">0</span></div>
      <div class="item">Word Count: <span id="words">0</span></div>
      <div class="item">Avg Word Length: <span id="avg">0</span></div>
      <div class="item">Complexity Level: <span id="level">-</span></div>
    </div>

    <div class="card">
      <h3>📌 Suggestions</h3>
      <div id="suggest"></div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    Developed by <span>Hamna Munir</span> | <span>Mirza Yasir Abdullah Baig</span>
  </div>

</div>

<script>
function analyze(){
  let text = document.getElementById("text").value.trim();
  if(!text){alert("Please enter prompt");return;}

  let sentences = text.split(/[.!?]+/).filter(s=>s.trim());
  let words = text.split(/\s+/).filter(w=>w);
  let letters = text.replace(/\s/g,"").length;

  let sentenceLen = (words.length / (sentences.length||1)).toFixed(1);
  let avgWord = (letters / (words.length||1)).toFixed(1);

  // readability score (simple formula)
  let score = 100 - (sentenceLen*2 + avgWord*3);
  score = Math.max(0, Math.min(100, Math.round(score)));

  // level
  let level = score>80?"Very Easy":score>60?"Easy":score>40?"Medium":"Hard";

  // circle update
  let circle = document.getElementById("circle");
  circle.textContent = score + "%";
  circle.style.background = `conic-gradient(#7c3aed ${score*3.6}deg,#ede9fe 0deg)`;

  document.getElementById("label").textContent = level + " Readability";

  document.getElementById("sent").textContent = sentenceLen;
  document.getElementById("words").textContent = words.length;
  document.getElementById("avg").textContent = avgWord;
  document.getElementById("level").textContent = level;

  // suggestions
  let sug = "";
  if(sentenceLen>20) sug += "<div class='item'>⚠️ Sentences are too long. Break them.</div>";
  if(avgWord>6) sug += "<div class='item'>⚠️ Use simpler words.</div>";
  if(score>80) sug += "<div class='item'>✅ Excellent readability.</div>";
  document.getElementById("suggest").innerHTML = sug;
}

function clearAll(){
  document.getElementById("text").value="";
  document.getElementById("circle").textContent="0%";
  document.getElementById("label").textContent="No Data";
  document.getElementById("sent").textContent="0";
  document.getElementById("words").textContent="0";
  document.getElementById("avg").textContent="0";
  document.getElementById("level").textContent="-";
  document.getElementById("suggest").innerHTML="";
}
</script>

</body>
</html>
