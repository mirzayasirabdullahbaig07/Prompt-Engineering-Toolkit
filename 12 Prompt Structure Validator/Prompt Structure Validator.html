<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prompt Structure Validator</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Segoe UI,Tahoma,sans-serif;
  background:linear-gradient(135deg,#f3f0ff,#ede9fe,#faf5ff);
  min-height:100vh;
  padding:20px;
  
  color:#1e1b4b;
}

.container{max-width:1100px;margin:auto;}

/* HEADER */
.header{
  text-align:center;
  padding:30px 20px;
}

.badge{
  display:inline-block;
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  color:#fff;
  padding:6px 16px;
  border-radius:20px;
  font-size:12px;
  letter-spacing:2px;
  margin-bottom:10px;
}

.header h1{
  font-size:2.4rem;
  font-weight:800;
  background:linear-gradient(90deg,#5b21b6,#7c3aed,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header p{color:#6b7280;margin-top:6px;}

/* CARD */
.card{
  background:#fff;
  border:1.5px solid #c4b5fd;
  border-radius:18px;
  padding:25px;
  margin-bottom:18px;
  box-shadow:0 4px 18px rgba(124,58,237,0.1);
}

label{
  font-size:12px;
  font-weight:700;
  color:#7c3aed;
  letter-spacing:1.5px;
}

textarea{
  width:100%;
  height:130px;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:1.5px solid #ddd6fe;
  background:#faf5ff;
  font-size:1rem;
  outline:none;
}

textarea:focus{
  border-color:#7c3aed;
  box-shadow:0 0 0 3px rgba(124,58,237,0.15);
}

/* BUTTONS */
.btn-row{display:flex;gap:10px;margin-top:12px;}

button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.primary{
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;
}
.clear{
  background:#ede9fe;
  color:#6d28d9;
  border:1px solid #c4b5fd;
}

/* FLOW BUILDER (NEW UNIQUE DESIGN) */
.flow{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.node{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:12px;
  border:1.5px solid #c4b5fd;
  background:#faf5ff;
  position:relative;
}

.node::before{
  content:"";
  position:absolute;
  left:20px;
  top:100%;
  width:2px;
  height:12px;
  background:#c4b5fd;
}

.node:last-child::before{display:none;}

.icon{
  width:30px;
  height:30px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:800;
}

.ok{background:#ede9fe;color:#5b21b6;}
.no{background:#f3f0ff;color:#a21caf;}

.text{
  font-size:0.9rem;
  color:#1e1b4b;
}

/* STATUS PANEL */
.status{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

.box{
  flex:1;
  min-width:160px;
  background:#fff;
  border:1.5px solid #c4b5fd;
  border-radius:14px;
  padding:15px;
  text-align:center;
}

.box h4{
  font-size:11px;
  color:#7c3aed;
  letter-spacing:1px;
}

.val{
  font-size:1.6rem;
  font-weight:800;
  color:#5b21b6;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:#9ca3af;
  border-top:1px solid #ddd6fe;
  padding-top:15px;
}

.footer span{color:#7c3aed;font-weight:700;}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="badge">AI TOOL</div>
  <h1>Prompt Structure Validator</h1>
  <p>Validate how well your prompt is structurally built</p>
</div>

<!-- INPUT -->
<div class="card">
  <label>ENTER PROMPT</label>
  <textarea id="text" placeholder="Type your prompt..."></textarea>

  <div class="btn-row">
    <button class="primary" onclick="validate()">Validate</button>
    <button class="clear" onclick="clearAll()">Clear</button>
  </div>
</div>

<!-- STATUS -->
<div class="card">
  <div class="status">

    <div class="box">
      <h4>ACTION</h4>
      <div class="val" id="a">0%</div>
    </div>

    <div class="box">
      <h4>LOGIC FLOW</h4>
      <div class="val" id="b">0%</div>
    </div>

    <div class="box">
      <h4>ORDER</h4>
      <div class="val" id="c">0%</div>
    </div>

  </div>
</div>

<!-- FLOW BUILDER -->
<div class="card">
  <h3 style="color:#5b21b6;margin-bottom:10px;">🧱 Structure Flow</h3>
  <div class="flow" id="flow"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  Developed by <span>Hamna Munir</span> | <span>Mirza Yasir Abdullah Baig</span>
</div>

</div>

<script>

function words(t){return t.toLowerCase().split(/\W+/).filter(w=>w);}

function validate(){
  let text=document.getElementById("text").value.trim();
  if(!text){alert("Enter prompt");return;}

  let w=words(text);

  let action=["write","create","build","generate","design","explain"].some(a=>w.includes(a));
  let logic=text.includes("because")||text.includes("so")||text.includes("therefore");
  let order=w.length>10;

  let a=action?85:40;
  let b=logic?80:35;
  let c=order?85:50;

  document.getElementById("a").textContent=a+"%";
  document.getElementById("b").textContent=b+"%";
  document.getElementById("c").textContent=c+"%";

  let flow=[];

  flow.push({ok:action,text:"Action clearly defined (verb present)"});
  flow.push({ok:logic,text:"Logical connection present"});
  flow.push({ok:order,text:"Sufficient structural length"});

  let html="";
  flow.forEach(f=>{
    html+=`
    <div class="node">
      <div class="icon ${f.ok?'ok':'no'}">${f.ok?'✔':'✖'}</div>
      <div class="text">${f.text}</div>
    </div>`;
  });

  document.getElementById("flow").innerHTML=html;
}

function clearAll(){
  document.getElementById("text").value="";
  ["a","b","c"].forEach(i=>document.getElementById(i).textContent="0%");
  document.getElementById("flow").innerHTML="";
}

</script>

</body>
</html>
