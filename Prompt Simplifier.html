<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prompt Simplifier</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Segoe UI,Tahoma,sans-serif;
  background:linear-gradient(135deg,#f3f0ff,#ede9fe,#faf5ff);
  min-height:100vh;
  padding:20px;
  color:#1e1b4b;
}

.container{max-width:1100px;margin:auto;}

/* HEADER */
.header{
  text-align:center;
  padding:30px 20px;
}

.badge{
  display:inline-block;
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  color:#fff;
  padding:6px 16px;
  border-radius:20px;
  font-size:12px;
  letter-spacing:2px;
  margin-bottom:10px;
}

.header h1{
  font-size:2.4rem;
  font-weight:800;
  background:linear-gradient(90deg,#5b21b6,#7c3aed,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header p{color:#6b7280;margin-top:6px;}

/* INPUT */
.card{
  background:#fff;
  border:1.5px solid #c4b5fd;
  border-radius:18px;
  padding:25px;
  box-shadow:0 4px 18px rgba(124,58,237,0.1);
  margin-bottom:18px;
}

textarea{
  width:100%;
  height:130px;
  padding:12px;
  border-radius:12px;
  border:1.5px solid #ddd6fe;
  background:#faf5ff;
  outline:none;
  resize:none;
}

textarea:focus{
  border-color:#7c3aed;
  box-shadow:0 0 0 3px rgba(124,58,237,0.15);
}

button{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;
}

/* WORKSPACE */
.workspace{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

@media(max-width:900px){
  .workspace{grid-template-columns:1fr;}
}

.panel{
  background:#fff;
  border:1.5px solid #c4b5fd;
  border-radius:18px;
  padding:15px;
  position:relative;
  overflow:hidden;
}

.panel::before{
  content:"🧩";
  position:absolute;
  font-size:90px;
  opacity:0.05;
  right:10px;
  top:10px;
}

.title{
  font-weight:900;
  color:#5b21b6;
  margin-bottom:10px;
}

/* BOXES */
.box{
  background:#faf5ff;
  border-left:5px solid #7c3aed;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  font-size:0.9rem;
  color:#374151;
  line-height:1.6;
}

/* STEPS */
.step{
  display:flex;
  align-items:flex-start;
  gap:8px;
  margin-top:8px;
  font-size:0.9rem;
  color:#374151;
}

.dot{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#ede9fe;
  color:#7c3aed;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:bold;
  flex-shrink:0;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:#9ca3af;
  border-top:1px solid #ddd6fe;
  padding-top:15px;
}

.footer span{color:#7c3aed;font-weight:700;}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="badge">PROMPT DECONSTRUCTION ENGINE</div>
  <h1>Prompt Simplifier</h1>
  <p>Convert complex prompts into simple structured instructions</p>
</div>

<!-- INPUT -->
<div class="card">

<textarea id="input" placeholder="Enter complex prompt here..."></textarea>
<button onclick="simplify()">Simplify Prompt</button>

</div>

<!-- WORKSPACE -->
<div class="workspace" id="workspace" style="display:none;">

<!-- BEFORE -->
<div class="panel">
<div class="title">📌 Original Prompt</div>
<div class="box" id="original"></div>
</div>

<!-- SIMPLIFIED -->
<div class="panel">
<div class="title">✂️ Simplified Version</div>
<div id="simple"></div>
</div>

<!-- STEPS -->
<div class="panel">
<div class="title">🧠 Breakdown Steps</div>
<div id="steps"></div>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
  Developed by <span>Hamna Munir</span> | <span>Mirza Yasir Abdullah Baig</span>
</div>

</div>

<script>

function simplify(){

let text=document.getElementById("input").value.trim();
if(!text){alert("Enter prompt");return;}

document.getElementById("workspace").style.display="grid";

/* Original */
document.getElementById("original").innerText=text;

/* Simple Version */
let simple=text
.replace(/explain|describe|elaborate on/gi,"tell about")
.replace(/in detail|comprehensively/gi,"clearly")
.replace(/complex|advanced/gi,"basic");

document.getElementById("simple").innerHTML=
`<div class="box">${simple}</div>`;

/* Steps */
let sentences=[
"Identify main idea of the prompt",
"Remove unnecessary complexity",
"Convert into simple instruction",
"Focus on core meaning only",
"Ensure clarity and readability"
];

let html="";
sentences.forEach((s,i)=>{
html+=`
<div class="step">
<div class="dot">${i+1}</div>
<div>${s}</div>
</div>`;
});

document.getElementById("steps").innerHTML=html;

}

</script>

</body>
</html>
