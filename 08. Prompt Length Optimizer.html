<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Length Optimizer</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ffffff,#f3e8ff,#ede9fe);
    padding:20px;
    color:#1e1b4b;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    text-align:center;
    padding:25px;
}

.badge{
    display:inline-block;
    padding:6px 16px;
    background:linear-gradient(90deg,#7c3aed,#a855f7);
    color:white;
    border-radius:20px;
    font-size:12px;
    letter-spacing:2px;
}

h1{
    margin-top:10px;
    font-size:2.3rem;
    background:linear-gradient(90deg,#5b21b6,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.card{
    background:white;
    border:1px solid #d8b4fe;
    border-radius:18px;
    padding:22px;
    margin-top:20px;
    box-shadow:0 6px 20px rgba(124,58,237,0.1);
}

label{
    display:block;
    font-weight:700;
    color:#6d28d9;
    margin-bottom:10px;
}

textarea{
    width:100%;
    height:160px;
    padding:14px;
    border-radius:12px;
    border:1px solid #c4b5fd;
    background:#faf5ff;
    outline:none;
    resize:none;
}

textarea:focus{
    border-color:#7c3aed;
}

.controls{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
}

.primary{
    background:#7c3aed;
    color:white;
}

.secondary{
    background:#ede9fe;
    color:#6d28d9;
}

.range-box{
    margin-top:15px;
}

input[type="range"]{
    width:100%;
}

.result{
    display:none;
}

.stat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.stat{
    background:#faf5ff;
    padding:15px;
    border-radius:12px;
    border:1px solid #e9d5ff;
}

.stat h3{
    color:#6d28d9;
    font-size:14px;
}

.stat p{
    font-size:22px;
    font-weight:800;
    margin-top:5px;
}

.badge2{
    display:inline-block;
    margin-top:10px;
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
    background:#ede9fe;
    color:#6d28d9;
}

.output-box{
    background:#faf5ff;
    padding:15px;
    border-radius:12px;
    border:1px dashed #c4b5fd;
    margin-top:10px;
    min-height:60px;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:#6b7280;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
    <div class="badge">AI PROMPT SUITE</div>
    <h1>Prompt Length Optimizer</h1>
</div>

<!-- INPUT -->
<div class="card">
    <label>Enter Your Prompt</label>
    <textarea id="input" placeholder="Type your prompt here..."></textarea>

    <div class="range-box">
        <label>Target Length (words): <span id="val">50</span></label>
        <input type="range" min="10" max="200" value="50" id="range" oninput="updateRange()">
    </div>

    <div class="controls">
        <button class="primary" onclick="optimize()">Optimize Prompt</button>
        <button class="secondary" onclick="clearAll()">Clear</button>
    </div>
</div>

<!-- RESULT -->
<div class="result" id="result">

    <div class="stat-grid">

        <div class="stat">
            <h3>Original Words</h3>
            <p id="ow">0</p>
        </div>

        <div class="stat">
            <h3>Optimized Words</h3>
            <p id="nw">0</p>
        </div>

        <div class="stat">
            <h3>Change</h3>
            <p id="diff">0</p>
        </div>

        <div class="stat">
            <h3>Status</h3>
            <span class="badge2" id="status">---</span>
        </div>

    </div>

    <div class="card">
        <label>Optimized Prompt</label>
        <div class="output-box" id="output"></div>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
Prompt Length Optimizer v1.0 <br>
Developed by Hamna Munir | Mirza Yasir Abdullah Baig
</div>

</div>

<script>

function updateRange(){
    document.getElementById("val").innerText =
    document.getElementById("range").value;
}

function optimize(){

    let text = document.getElementById("input").value.trim();
    if(!text){ alert("Enter a prompt"); return; }

    let target = parseInt(document.getElementById("range").value);

    let words = text.split(/\s+/).filter(w=>w.length>0);
    let originalCount = words.length;

    // simple optimization: remove filler words
    let fillers = ["very","really","just","basically","actually","quite","a bit","kind of","sort of"];
    let optimizedWords = words.filter(w=>!fillers.includes(w.toLowerCase()));

    let optimizedText = optimizedWords.join(" ");

    // adjust length logic (trim or expand)
    if(optimizedWords.length > target){
        optimizedText = optimizedWords.slice(0,target).join(" ") + "...";
    }

    if(optimizedWords.length < target){
        optimizedText += " ".repeat(target - optimizedWords.length) + " (expanded)";
    }

    let newCount = optimizedText.split(/\s+/).filter(w=>w.length>0).length;

    document.getElementById("ow").innerText = originalCount;
    document.getElementById("nw").innerText = newCount;
    document.getElementById("diff").innerText = newCount - originalCount;

    let status = document.getElementById("status");

    if(newCount > target) status.innerText = "Too Long";
    else if(newCount < target) status.innerText = "Too Short";
    else status.innerText = "Perfect Match";

    document.getElementById("output").innerText = optimizedText;
    document.getElementById("result").style.display = "block";
}

function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("result").style.display = "none";
}

</script>

</body>
</html>
