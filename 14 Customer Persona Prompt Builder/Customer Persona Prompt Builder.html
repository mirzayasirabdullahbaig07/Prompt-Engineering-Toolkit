<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Customer Persona Prompt Builder</title>


<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Segoe UI,Tahoma,sans-serif;
  background:linear-gradient(135deg,#f3f0ff,#ede9fe,#faf5ff);
  min-height:100vh;
  padding:20px;
  
  color:#1e1b4b;
}

.container{max-width:1100px;margin:auto;}

/* HEADER */
.header{
  text-align:center;
  padding:30px 20px;
}

.badge{
  display:inline-block;
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  color:#fff;
  padding:6px 16px;
  border-radius:20px;
  font-size:12px;
  letter-spacing:2px;
  margin-bottom:10px;
}

.header h1{
  font-size:2.4rem;
  font-weight:800;
  background:linear-gradient(90deg,#5b21b6,#7c3aed,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header p{color:#6b7280;margin-top:6px;}

/* FORM CARD */
.card{
  background:#fff;
  border:1.5px solid #c4b5fd;
  border-radius:18px;
  padding:25px;
  margin-bottom:18px;
  box-shadow:0 4px 18px rgba(124,58,237,0.1);
}

label{
  font-size:12px;
  font-weight:700;
  color:#7c3aed;
  letter-spacing:1.5px;
}

/* INPUTS */
input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1.5px solid #ddd6fe;
  background:#faf5ff;
  outline:none;
}

input:focus,select:focus{
  border-color:#7c3aed;
  box-shadow:0 0 0 3px rgba(124,58,237,0.15);
}

/* GRID FORM */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media(max-width:800px){
  .grid{grid-template-columns:1fr;}
}

/* BUTTON */
button{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;
}

/* TAGS */
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.tag{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  background:#ede9fe;
  color:#5b21b6;
  border:1px solid #c4b5fd;
}

/* OUTPUT */
.output{
  background:#fff;
  border:1.5px solid #c4b5fd;
  border-radius:18px;
  padding:20px;
  box-shadow:0 4px 14px rgba(124,58,237,0.1);
}

.title{
  font-size:1.3rem;
  font-weight:900;
  color:#5b21b6;
}

.desc{
  margin-top:10px;
  font-size:0.95rem;
  color:#374151;
  line-height:1.6;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:#9ca3af;
  border-top:1px solid #ddd6fe;
  padding-top:15px;
}

.footer span{color:#7c3aed;font-weight:700;}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="badge">MARKETING AI ENGINE</div>
  <h1>Customer Persona Prompt Builder</h1>
  <p>Create structured customer profiles for AI marketing prompts</p>
</div>

<!-- FORM -->
<div class="card">

<div class="grid">

<div>
<label>PRODUCT / SERVICE</label>
<input id="product" placeholder="e.g. Online Coding Course">
</div>

<div>
<label>TARGET AGE GROUP</label>
<input id="age" placeholder="e.g. 18-25">
</div>

<div>
<label>GOAL</label>
<input id="goal" placeholder="e.g. Increase sales / awareness">
</div>

<div>
<label>CUSTOMER TYPE</label>
<select id="type">
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
<option>Professional</option>
</select>
</div>

</div>

<button onclick="build()">Generate Persona Prompt</button>

</div>

<!-- TAGS -->
<div class="card">
<h3 style="color:#5b21b6;margin-bottom:10px;">🎯 Persona Traits</h3>
<div class="tags" id="tags"></div>
</div>

<!-- OUTPUT -->
<div class="output" id="out" style="display:none;">
<div class="title">Generated Customer Persona Prompt</div>
<div class="desc" id="text"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  Developed by <span>Hamna Munir</span> | <span>Mirza Yasir Abdullah Baig</span>
</div>

</div>

<script>

function build(){

let product=document.getElementById("product").value;
let age=document.getElementById("age").value;
let goal=document.getElementById("goal").value;
let type=document.getElementById("type").value;

if(!product||!age||!goal){alert("Fill all fields");return;}

let traits=[
"Tech-Savvy",
"Goal-Oriented",
"Budget Conscious",
"Problem Solver",
"Fast Learner",
"Digital Consumer"
];

let html="";
traits.forEach(t=>{
html+=`<div class="tag">${t}</div>`;
});

document.getElementById("tags").innerHTML=html;

document.getElementById("out").style.display="block";

document.getElementById("text").innerHTML=
`Create a detailed customer persona for <b>${product}</b> targeting age group <b>${age}</b>.
The audience is classified as <b>${type}</b> level users with the goal of <b>${goal}</b>.
Include behavioral patterns, motivations, pain points, and decision triggers.
Ensure marketing insights are optimized for conversion strategy development.`;

}

</script>

</body>
</html>
