<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Story Writer Persona Builder</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Segoe UI,Tahoma,sans-serif;
  background:linear-gradient(135deg,#f3f0ff,#ede9fe,#faf5ff);
  min-height:100vh;
  padding:20px;
  color:#1e1b4b;
}

.container{max-width:1100px;margin:auto;}

/* HEADER */
.header{
  text-align:center;
  padding:30px 20px;
}

.badge{
  display:inline-block;
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  color:#fff;
  padding:6px 16px;
  border-radius:20px;
  font-size:12px;
  letter-spacing:2px;
  margin-bottom:10px;
}

.header h1{
  font-size:2.4rem;
  font-weight:800;
  background:linear-gradient(90deg,#5b21b6,#7c3aed,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header p{color:#6b7280;margin-top:6px;}

/* INPUT */
.card{
  background:#fff;
  border:1.5px solid #c4b5fd;
  border-radius:18px;
  padding:25px;
  margin-bottom:18px;
  box-shadow:0 4px 18px rgba(124,58,237,0.1);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media(max-width:800px){
  .grid{grid-template-columns:1fr;}
}

label{
  font-size:12px;
  font-weight:700;
  color:#7c3aed;
  letter-spacing:1.5px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1.5px solid #ddd6fe;
  background:#faf5ff;
  outline:none;
}

input:focus,select:focus{
  border-color:#7c3aed;
  box-shadow:0 0 0 3px rgba(124,58,237,0.15);
}

button{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;
}

/* CINEMA STAGE */
.stage{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

@media(max-width:900px){
  .stage{grid-template-columns:1fr;}
}

.scene{
  background:#fff;
  border:1.5px solid #c4b5fd;
  border-radius:18px;
  padding:15px;
  position:relative;
  overflow:hidden;
}

.scene::before{
  content:"🎬";
  position:absolute;
  font-size:90px;
  opacity:0.05;
  right:10px;
  top:10px;
}

.title{
  font-weight:900;
  color:#5b21b6;
  margin-bottom:10px;
}

/* TAGS */
.tag{
  display:inline-block;
  padding:6px 10px;
  margin:4px 4px 0 0;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  background:#ede9fe;
  color:#5b21b6;
  border:1px solid #c4b5fd;
}

/* STORY BOX */
.story{
  background:#faf5ff;
  border-left:5px solid #7c3aed;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  font-size:0.9rem;
  color:#374151;
  line-height:1.7;
}

/* METER */
.meter{
  margin-top:10px;
  height:10px;
  background:#ede9fe;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  transition:0.8s;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:#9ca3af;
  border-top:1px solid #ddd6fe;
  padding-top:15px;
}

.footer span{color:#7c3aed;font-weight:700;}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="badge">CREATIVE STORY ENGINE</div>
  <h1>Story Writer Persona Builder</h1>
  <p>Generate AI-driven storytelling personalities</p>
</div>

<!-- INPUT -->
<div class="card">

<div class="grid">

<div>
<label>GENRE</label>
<input id="genre" placeholder="e.g. Fantasy / Sci-Fi / Horror">
</div>

<div>
<label>WRITING STYLE</label>
<input id="style" placeholder="e.g. Emotional / Cinematic / Minimalist">
</div>

<div>
<label>TARGET AUDIENCE</label>
<input id="audience" placeholder="e.g. Young Adults / Children">
</div>

<div>
<label>STORY GOAL</label>
<input id="goal" placeholder="e.g. Inspire / Entertain / Educate">
</div>

</div>

<button onclick="build()">Generate Story Persona</button>

</div>

<!-- STAGE -->
<div class="stage" id="stage" style="display:none;">

<!-- SCENE 1 -->
<div class="scene">
<div class="title">🎭 Narrative Identity</div>
<div id="identity"></div>
</div>

<!-- SCENE 2 -->
<div class="scene">
<div class="title">🧠 Story Mechanics</div>
<div id="mechanics"></div>
</div>

<!-- SCENE 3 -->
<div class="scene">
<div class="title">📖 Creativity Output</div>
<div id="output"></div>

<div class="meter"><div class="fill" id="fill"></div></div>

</div>

</div>

<!-- STORY -->
<div class="card">
<div class="title">✨ Generated Story Concept</div>
<div class="story" id="story"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  Developed by <span>Hamna Munir</span> |  <span>Mirza Yasir Abdullah Baig</span>
</div>

</div>

<script>

function build(){

let genre=document.getElementById("genre").value;
let style=document.getElementById("style").value;
let audience=document.getElementById("audience").value;
let goal=document.getElementById("goal").value;

if(!genre||!style||!audience||!goal){alert("Fill all fields");return;}

document.getElementById("stage").style.display="grid";

/* Identity */
document.getElementById("identity").innerHTML=`
<div class="tag">${genre}</div>
<div class="tag">${style}</div>
<div class="tag">Imaginative Writer</div>
<div class="tag">Narrative Architect</div>
`;

/* Mechanics */
document.getElementById("mechanics").innerHTML=`
<div class="tag">Character Driven</div>
<div class="tag">Plot Focused</div>
<div class="tag">Emotional Depth</div>
<div class="tag">${audience}</div>
`;

/* Output */
document.getElementById("output").innerHTML=`
<div class="tag">${goal}</div>
<div class="tag">Creative Flow</div>
<div class="tag">Story Structuring</div>
<div class="tag">AI Assisted Writing</div>
`;

document.getElementById("fill").style.width="90%";

/* STORY */
document.getElementById("story").innerHTML=
`A <b>${genre}</b> story written in a <b>${style}</b> style targeting <b>${audience}</b>. 
The narrative is designed to <b>${goal}</b> through immersive characters, structured storytelling arcs, and emotional engagement. 
This persona represents a highly creative AI storyteller capable of producing cinematic-level narratives with depth and imagination.`;

}

</script>

</body>
</html>
